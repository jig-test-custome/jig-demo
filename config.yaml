app:
    environment: production
    name: demo-application
    version: 1.0.0
cache:
    backend: redis
    host: cache.internal
    port: 6379
    ttl: 3600
database:
    host: db.internal
    name: appdb
    pool_size: 10
    port: 5432
features:
    feature_flags:
        - enable_new_ui
        - enable_analytics
        - dark_mode
logging:
    format: json
    level: info
    output: stdout
